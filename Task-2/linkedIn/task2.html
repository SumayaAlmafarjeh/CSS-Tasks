<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style2.css" />
    
</head>
<body>
    <div class="main-container">
        <div class="logo-sec">
            <img src="./assets/linkedin-logo.png" alt="linkedin logo"/>
        </div>
        <div class="signin-box">
            <h1>Sign in</h1>
            <p class="text-notes">Stay updated on your professional world</p>
            <input type="email" placeholder="Email or Phone"/>
            <div><input type="password" placeholder="Password"/></div>
            
            <p class="imp-txt">Forgot password?</p>
            <button type="button" class="btn signin-btn">Sign in</button>
            <div class="devidor text-notes">
                <hr>
                <span>or</span>
                <hr>
            </div>
            <button type="button" class="btn apple-signin-btn"><img src="./assets/apple-logo.png" alt="apple logo"/> Sign in with Apple</button>
        </div>
        <div class="signup-link">
            <p class="normal-txt">New to LinkedIn? <a href="#" class="imp-txt">Join now</a></p>
        </div>
        <footer>
            <div class="copy-right"> 
                <img src="./assets/linkedin-black.png"/>
                <span>&copy 2021</span>
            </div>
            <div>
                User Agreement
            </div>
            <div>
                Privacy Policy
            </div>
            <div>
                Community Guidlines
            </div>
            <div>
                Cookie Policy
            </div>
            <div>
                copyright Policy
            </div>
            <div>
                send feedback
            </div>
            <div>
                Language
            </div> 

        </footer>

    </div>
</body>
</html>
